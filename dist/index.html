<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Pig Rider - Endless Runner</title>
  <!-- Стили подключены через main.css в src/main.js -->
  <script type="module" crossorigin src="/game.min.js"></script>
</head>
<body>
  <!-- Webflow Structure -->
  <div id="game-root" class="game-state">

    <!-- Start Screen -->
    <div class="game-ui game-start">
      <div class="row-12 text-align--center">
        <h2>Want a pig ride?</h2>
        <div class="col col-align--ccenter">
          <div class="b1-regular">Collect <span class="b1-medium">500</span></div>
          <div class="game-coinstar">
            <svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 63 61" fill="none" vector-effect="non-scaling-stroke" class="game-coinstar">
              <path d="M16.5277 46.1809C14.1761 40.4122 16.8948 31.1126 23.632 23.4759C30.3691 15.8393 38.9781 12.2988 44.6152 14.3433L45.0979 13.7962L47.4847 16.1305C52.6352 21.1679 50.3063 32.6242 42.2837 41.7179C34.2611 50.8116 23.5823 54.0998 18.4318 49.0624L16.045 46.728L16.5277 46.1809Z" fill="#232222" stroke="#232222" stroke-linecap="round" stroke-linejoin="round"></path>
              <path d="M45.6879 14.3854C50.8384 19.4227 48.5102 30.8782 40.4877 39.9718C32.4652 49.0654 21.7864 52.3536 16.6359 47.3163C11.4854 42.2789 13.8136 30.8235 21.8361 21.7299C29.8586 12.6362 40.5374 9.348 45.6879 14.3854Z" fill="#FFB772" stroke="#232222" stroke-linecap="round" stroke-linejoin="round"></path>
              <path d="M37.4911 37.0408C31.5692 43.7534 23.9345 46.4231 20.4385 43.0039" stroke="#232222" stroke-linecap="round" stroke-linejoin="round"></path>
              <path d="M25.4124 22.325C24.8498 20.2931 23.2621 18.7056 21.2302 18.1433L20.5854 17.9648L21.2302 17.7864C23.2621 17.2241 24.8498 15.6366 25.4124 13.6047L25.5895 12.9648L25.7628 13.5955C26.3225 15.6325 27.9122 17.2251 29.9481 17.7885L30.5854 17.9648L29.9481 18.1412C27.9122 18.7046 26.3225 20.2972 25.7628 22.3341L25.5895 22.9648L25.4124 22.325Z" fill="#F8F2E9" stroke="#232222" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
          </div>
        </div>
        <div class="row-align--center">
          <a id="start-game" btn-data-color="orange" game-btn-start="" href="#" class="btn btn-game sh-3 w-button">Play now</a>
        </div>
      </div>
    </div>

    <!-- Running Screen (Game HUD) -->
    <div class="game-ui game-running" style="display: none;">
      <div class="game-head">
        <div class="game-logo--state">
          <div class="game-logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 38 38" fill="none" vector-effect="non-scaling-stroke">
              <path d="M13.8763 33.2266L14.8096 33.9983L11.9268 33.9985L11.0503 33.2267L13.8763 33.2266Z" fill="#232222" stroke="#232222" stroke-width="0.802063" stroke-linejoin="round"></path>
              <path d="M21.9124 33.2266L22.8457 33.9983L19.963 33.9985L19.0864 33.2267L21.9124 33.2266Z" fill="#232222" stroke="#232222" stroke-width="0.802063" stroke-linejoin="round"></path>
              <path d="M21.9397 28.4695L22.873 29.2413L16.5927 12.262L15.7162 11.4902L21.9397 28.4695Z" fill="#232222" stroke="#232222" stroke-width="0.802063" stroke-linejoin="round"></path>
              <path d="M21.9387 33.2282L22.872 34L35 3.77178L34.2531 3L21.9387 33.2282Z" fill="#232222" stroke="#232222" stroke-width="0.802063" stroke-linejoin="round"></path>
              <path d="M22.0967 33.2239L34.2368 3.02148H32.2899L21.7572 28.1252L15.5711 11.4413H11.0322L19.092 33.2219L22.0967 33.2239Z" fill="#FF6F23" stroke="#232222" stroke-width="0.802063" stroke-linejoin="round"></path>
              <path d="M13.9015 33.2282L14.8349 34L26.9629 3.77178L26.216 3L13.9015 33.2282Z" fill="#232222" stroke="#232222" stroke-width="0.802063" stroke-linejoin="round"></path>
              <path d="M13.9026 28.4695L14.8359 29.2413L8.55563 12.262L7.67911 11.4902L13.9026 28.4695Z" fill="#232222" stroke="#232222" stroke-width="0.802063" stroke-linejoin="round"></path>
              <path d="M14.0652 33.2239L26.2052 3.02148H24.257L13.7243 28.1252L7.5382 11.4413H3L11.0604 33.2239H14.0652Z" fill="#FF6F23" stroke="#232222" stroke-width="0.802063" stroke-linejoin="round"></path>
            </svg>
          </div>
        </div>
        <div class="game-counter">
          <div class="game-coin coin-head">
            <svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 76 71" fill="none" vector-effect="non-scaling-stroke">
              <path d="M17.4985 50.5316C15.0532 43.5045 19.1348 32.9314 28.0387 24.7715C36.9427 16.6115 47.832 13.4646 54.6197 16.5123L55.2576 15.9277L58.016 18.9376C63.9688 25.4331 60.1982 38.5766 49.5953 48.2935C38.9925 58.0104 25.5718 60.6217 19.6191 54.1262L16.8606 51.1162L17.4985 50.5316Z" fill="#232222"></path>
              <path d="M55.9475 16.6809C61.9002 23.1763 58.1306 36.3189 47.5279 46.0357C36.9252 55.7524 23.5044 58.3638 17.5517 51.8684C11.599 45.373 15.3686 32.2304 25.9714 22.5136C36.5741 12.7969 49.9949 10.1855 55.9475 16.6809Z" fill="#FFB772" stroke="#232222" stroke-linejoin="round"></path>
            </svg>
          </div>
          <div class="b1-regular"><span game-counter="">0</span>/500</div>
        </div>
      </div>
    </div>

    <!-- PixiJS Canvas -->
    <canvas id="game-canvas"></canvas>

  </div>

</body>
</html>
