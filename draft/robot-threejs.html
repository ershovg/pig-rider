<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Robot - Three.js</title>
    <style>
        body {
            margin: 0;
            background: #1a1a2e;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 100vh;
            pointer-events: none;
            z-index: 1000;
        }

        canvas {
            display: block;
            pointer-events: auto;
        }

        .content {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px;
            color: white;
            text-align: center;
        }

        .section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-family: monospace;
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="content">
        <div class="section">
            <h1>Секция 1</h1>
            <p>Робот в центре следит за вашим курсором мыши!</p>
            <button style="padding: 10px 20px; font-size: 16px; cursor: pointer;">Кнопка 1</button>
        </div>

        <div class="section">
            <h1>Секция 2</h1>
            <p>Скроллите вниз, робот остается на месте</p>
            <button style="padding: 10px 20px; font-size: 16px; cursor: pointer;">Кнопка 2</button>
        </div>

        <div class="section">
            <h1>Секция 3</h1>
            <p>Робот зафиксирован и всегда видим</p>
            <button style="padding: 10px 20px; font-size: 16px; cursor: pointer;">Кнопка 3</button>
        </div>

        <div class="section">
            <h1>Секция 4</h1>
            <p>Последняя секция для демонстрации</p>
            <button style="padding: 10px 20px; font-size: 16px; cursor: pointer;">Кнопка 4</button>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Scene setup
        const scene = new THREE.Scene();

        // Camera
        const container = document.getElementById('canvas-container');
        const camera = new THREE.PerspectiveCamera(
            45,
            container.clientWidth / container.clientHeight,
            0.1,
            1000
        );
        camera.position.set(0, 1, 4);

        // Renderer with transparent background
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enableZoom = false; // Отключаем zoom чтобы работал скролл
        controls.target.set(0, 1, 0);
        controls.update();

        // Mouse tracking
        const mouse = { x: 0, y: 0 };
        document.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(5, 10, 5);
        scene.add(mainLight);

        const fillLight = new THREE.DirectionalLight(0x4488ff, 0.3);
        fillLight.position.set(-5, 5, -5);
        scene.add(fillLight);

        const rimLight = new THREE.DirectionalLight(0xff88ff, 0.5);
        rimLight.position.set(0, 5, -10);
        scene.add(rimLight);

        // Animated gradient shader
        const gradientShader = {
            uniforms: {
                time: { value: 0 },
                colorA: { value: new THREE.Color(0x00ffff) },
                colorB: { value: new THREE.Color(0xff00ff) },
                colorC: { value: new THREE.Color(0xffff00) },
                baseColor: { value: new THREE.Color(0x808080) },
                gradientStrength: { value: 0.8 }
            },
            vertexShader: `
                varying vec2 vUv;
                varying vec3 vNormal;
                varying vec3 vPosition;
                
                void main() {
                    vUv = uv;
                    vNormal = normalize(normalMatrix * normal);
                    vPosition = position;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform float time;
                uniform vec3 colorA;
                uniform vec3 colorB;
                uniform vec3 colorC;
                uniform vec3 baseColor;
                uniform float gradientStrength;
                
                varying vec2 vUv;
                varying vec3 vNormal;
                varying vec3 vPosition;
                
                void main() {
                    // Animated gradient based on position and time
                    float angle = atan(vPosition.x, vPosition.z);
                    float normalizedAngle = (angle + 3.14159) / (2.0 * 3.14159);
                    
                    // Create flowing gradient
                    float t = fract(normalizedAngle + time * 0.1);
                    
                    vec3 gradient;
                    if (t < 0.33) {
                        gradient = mix(colorA, colorB, t * 3.0);
                    } else if (t < 0.66) {
                        gradient = mix(colorB, colorC, (t - 0.33) * 3.0);
                    } else {
                        gradient = mix(colorC, colorA, (t - 0.66) * 3.0);
                    }
                    
                    // Add vertical fade
                    float verticalFade = smoothstep(-1.0, 1.0, vPosition.y);
                    
                    // Mix with base color
                    vec3 finalColor = mix(baseColor, gradient, gradientStrength * verticalFade);
                    
                    // Add fresnel effect for rim lighting
                    float fresnel = pow(1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0))), 2.0);
                    finalColor += gradient * fresnel * 0.3;
                    
                    gl_FragColor = vec4(finalColor, 1.0);
                }
            `
        };

        // Load robot model
        const dracoLoader = new DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');

        const loader = new GLTFLoader();
        loader.setDRACOLoader(dracoLoader);

        let robot = null;
        let robotHead = null;
        let robotLeftArm = null;
        let robotRightArm = null;
        let mixer = null;

        // Idle arm animation
        let armAnimTime = 0;
        let nextArmAction = Date.now() + Math.random() * 5000 + 3000;

        loader.load(
            'threejs-robot.glb', // Путь к вашему файлу
            (gltf) => {
                robot = gltf.scene;

                // Keep original materials from Blender
                robot.traverse((child) => {
                    if (child.isMesh) {
                        console.log('Part:', child.name);
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                    // Find head - root0
                    if (child.name === 'root0') {
                        robotHead = child;
                    }
                    // Find arms - root3 and root4
                    if (child.name === 'root3') {
                        robotLeftArm = child;
                        console.log('✓ Left arm (root3) found');
                    }
                    if (child.name === 'root4') {
                        robotRightArm = child;
                        console.log('✓ Right arm (root4) found');
                    }
                });

                // Setup animations if present
                if (gltf.animations && gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(robot);
                    gltf.animations.forEach((clip) => {
                        mixer.clipAction(clip).play();
                    });
                }

                // Center and scale robot
                const box = new THREE.Box3().setFromObject(robot);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 2 / maxDim;
                robot.scale.setScalar(scale);
                
                robot.position.x = -center.x * scale;
                robot.position.y = -center.y * scale;
                robot.position.z = -center.z * scale;

                scene.add(robot);
                console.log('Robot loaded successfully!');
            },
            (progress) => {
                console.log('Loading:', (progress.loaded / progress.total * 100) + '%');
            },
            (error) => {
                console.error('Error loading robot:', error);
            }
        );

        // Animation loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const deltaTime = clock.getDelta();

            // Update animations
            if (mixer) {
                mixer.update(deltaTime);
            }

            // Head follows mouse
            if (robotHead) {
                const targetRotationY = mouse.x * 0.25;
                const targetRotationX = -mouse.y * 0.08;

                robotHead.rotation.y += (targetRotationY - robotHead.rotation.y) * 0.05;
                robotHead.rotation.x += (targetRotationX - robotHead.rotation.x) * 0.05;
            }

            // Slight robot body position shift based on mouse (parallax effect)
            if (robot) {
                const targetX = mouse.x * 0.1;
                const targetY = mouse.y * 0.05;

                robot.position.x += (targetX - robot.position.x) * 0.03;
                robot.position.y += (targetY - robot.position.y) * 0.03;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        // Optional: Toggle gradient animation on/off with spacebar
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && robot) {
                robot.traverse((child) => {
                    if (child.isMesh && child.material.uniforms) {
                        const currentStrength = child.material.uniforms.gradientStrength.value;
                        child.material.uniforms.gradientStrength.value = currentStrength > 0 ? 0 : 0.8;
                    }
                });
            }
        });
    </script>
</body>
</html>
