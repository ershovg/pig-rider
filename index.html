<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Pig Rider - Endless Runner</title>
  <style>
    /* Minimal reset - стили будут добавлены позже */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* PixiJS Canvas - будет создан автоматически */
    #game-container canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    /* HTML UI поверх canvas */
    .screen, .modal, .hud {
      position: absolute;
      z-index: 10;
    }

    /* Utility classes */
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <!-- PixiJS Canvas будет создан здесь автоматически -->

    <!-- Loading Screen -->
    <div id="loading-screen" class="screen">
      <p>Loading...</p>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" class="screen hidden">
      <h1>Want a pig ride?</h1>
      <p>Collect 500 coins</p>
      <button id="play-btn">Play now</button>
    </div>

    <!-- Game HUD -->
    <div id="game-hud" class="hud hidden">
      <img src="/assets/sprites/mellowLogo.svg" id="mellow-logo" alt="Mellow" />
      <span id="coin-count">0/500</span>
    </div>

    <!-- Booster Modal -->
    <div id="booster-modal" class="modal hidden">
      <div class="modal-content">
        <h2>Yay! You caught a Mellow booster!</h2>
        <p>Speed boost activated</p>
        <button id="booster-continue-btn">Cool, continue</button>
      </div>
    </div>

    <!-- Win Screen -->
    <div id="win-screen" class="screen hidden">
      <h1>You won!</h1>
      <p>Ready to play IRL?</p>
      <p id="win-score">Score: 500</p>
      <button id="win-demo-btn">Book a demo</button>
      <button id="win-retry-btn">Try Again</button>
    </div>

    <!-- Lose Screen -->
    <div id="lose-screen" class="screen hidden">
      <h1>Ooops, that hurt...</h1>
      <p>Beat it IRL!</p>
      <p id="lose-score">Score: 0</p>
      <button id="lose-demo-btn">Book a demo</button>
      <button id="lose-retry-btn">Try Again</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
