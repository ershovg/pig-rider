<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Pig Rider - Local Dev</title>
  <style>
    /* Минимальные стили для dev режима */
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    #game-root {
      width: 100%;
      max-width: 1200px;
      position: relative;
    }

    h1 {
      text-align: center;
      margin: 20px 0;
      font-size: 2rem;
    }

    .dev-notice {
      text-align: center;
      opacity: 0.8;
      font-size: 0.9rem;
      margin-bottom: 20px;
    }

    /* Lottie overlay стили */
    .lottie-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>

<body>
  <!-- Минимальная структура для локальной разработки -->
  <!-- В продакшене используется HTML из Webflow -->

  <div id="game-root">
    <h1>🐷 Pig Rider Game</h1>
    <p class="dev-notice">Dev Mode - Game UI managed by UIController</p>

    <!-- Lottie Animations -->
    <div id="lottie-tutorial" class="lottie-overlay" style="display: none;"></div>
    <div id="lottie-booster" class="lottie-overlay" style="display: none;"></div>

    <!-- PixiJS Canvas (обязательно) -->
    <canvas id="game-canvas"></canvas>
  </div>

  <!-- Entry point для Vite dev server -->
  <script type="module" src="/src/main.js"></script>
</body>

</html>
